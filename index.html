<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>浮世繪 AI 導覽</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html, body { width: 100%; height: 100%; overflow: hidden; margin: 0; padding: 0; background: #07070f; font-family: -apple-system, 'Noto Sans TC', sans-serif;}
    .phone { width: 100%; height: 100dvh; position: relative; overflow: hidden; }

    /* ════ 第一頁：導覽介面 ════ */
    #sg{position:absolute;inset:0;background:linear-gradient(155deg,#0d1b4b 0%,#0a3060 45%,#0c4870 80%,#071a3a 100%);display:flex;flex-direction:column;}
    .g-topbar{padding:15px 22px 10px; display:flex; justify-content:flex-end; align-items:center; flex-shrink:0;}
    .aw-nav{display:flex; align-items:center; gap:8px;}
    .n-btn{width:32px; height:32px; border-radius:50%; border:1px solid rgba(255,255,255,.18); background:rgba(255,255,255,.07); color:rgba(255,255,255,.8); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center;}
    .n-btn:active{background:rgba(255,255,255,.25);}
    .aw-ct{font-size:12px; color:rgba(255,255,255,.35); min-width: 40px; text-align: center; letter-spacing: 1px;}

    .aw-card{margin:0 auto; width: calc(100% - 44px); max-width: 500px; aspect-ratio: 1/1; border-radius:24px; overflow:hidden; position:relative; flex-shrink:0; box-shadow:0 20px 50px rgba(0,0,0,0.5); background: #000;}
    .aw-img-blur {position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: blur(30px) brightness(0.5); transform: scale(1.2);}
    .aw-img{ position: relative; width:100%; height:100%; object-fit:contain; z-index: 1; }
    .aw-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,22,70,0.85) 0%, transparent 40%); z-index: 2;}
    .aw-info{position:absolute;bottom:18px;left:20px;right:20px; z-index: 3;}
    .aw-nm{font-size:22px; font-weight:700; color:#fff; letter-spacing:1px; text-shadow:0 2px 15px rgba(0,0,0,0.6);}

    .audio-pl{margin:14px auto 0; width: calc(100% - 44px); max-width: 500px; padding:12px 18px; background:rgba(255,255,255,.07); backdrop-filter:blur(25px); border-radius:18px; border:1px solid rgba(255,255,255,.1); flex-shrink:0; display: flex; align-items: center; gap: 15px;}
    .prog-area { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .prog-track{height:4px; background:rgba(255,255,255,.12); border-radius:2px; cursor:pointer; position: relative;}
    .prog-fill{height:100%; background:linear-gradient(90deg,#4fc3f7,#81d4fa); border-radius:2px; width:0%; position:relative; pointer-events: none;}
    .prog-fill::after{content:''; position:absolute; right:-4px; top:50%; transform:translateY(-50%); width:10px; height:10px; border-radius:50%; background:#81d4fa; box-shadow:0 0 10px rgba(129,212,250,1);}
    .time-row { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,.3); font-variant-numeric: tabular-nums; }
    .pl-btn{width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,#4fc3f7,#0288d1); border:none; color:#fff; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 20px rgba(79,195,247,.4); flex-shrink: 0;}
    .pl-btn:active { transform: scale(0.9); }

    .g-body{flex:1; overflow-y:auto; margin:12px auto 0; padding: 0 22px 140px; max-width: 600px; scrollbar-width:none;}
    .g-body::-webkit-scrollbar{display:none;}
    .g-text{font-size:15px; line-height:1.95; color:rgba(255,255,255,.75); letter-spacing:.3px; text-align: justify;}
    .g-text p{margin-bottom:16px;}
    
    .g-bottom {position: absolute; bottom: 0; left: 0; right: 0; padding-top: 100px; padding-bottom: calc(25px + env(safe-area-inset-bottom)); display: flex; justify-content: center; align-items: center; background: linear-gradient(to top, #071a3a 15%, rgba(7, 26, 58, 0.6) 55%, transparent 100%); transition: opacity 0.4s ease, transform 0.4s ease; z-index: 20; pointer-events: none; }
    .g-bottom.hide { opacity: 0; pointer-events: none; transform: translateY(30px); }

    .mini-orb { width: 60px; height: 60px; position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; transition: transform 0.2s; pointer-events: auto; }
    .mini-orb:active { transform: scale(0.95); }
    .mo-glow { position: absolute; width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, rgba(79, 195, 247, 0.3) 0%, rgba(138, 43, 226, 0.1) 45%, transparent 70%); animation: pulseGlow 3s ease-in-out infinite alternate; pointer-events: none; }
    .mo-core { position: absolute; width: 42px; height: 42px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #e0b0ff 0%, #a855f7 25%, #4338ca 65%, #1e1b4b 100%); box-shadow: inset -3px -3px 8px rgba(0,0,0,0.6), inset 4px 4px 10px rgba(255,255,255,0.7), 0 0 14px rgba(168, 85, 247, 0.5); animation: morphCore 6s ease-in-out infinite alternate; }
    .mo-ring-1 { position: absolute; width: 56px; height: 56px; border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; border: 2px solid rgba(255,255,255,0.8); box-shadow: 0 0 8px #7dd3fc, inset 0 0 8px #7dd3fc; animation: spinRing 4s linear infinite; mix-blend-mode: screen; }
    .mo-ring-2 { position: absolute; width: 60px; height: 60px; border-radius: 60% 40% 30% 70% / 50% 60% 40% 50%; border: 2px solid rgba(192, 132, 252, 0.6); box-shadow: 0 0 12px rgba(168, 85, 247, 0.6), inset 0 0 10px rgba(168, 85, 247, 0.4); animation: spinRingReverse 6s linear infinite; mix-blend-mode: screen; }
    .mo-highlight { position: absolute; width: 42px; height: 42px; border-radius: 50%; background: radial-gradient(circle at 50% 15%, rgba(255,255,255,0.5) 0%, transparent 35%); pointer-events: none; z-index: 2; }
    
    @keyframes pulseGlow { 0% { transform: scale(0.9); opacity: 0.7; } 100% { transform: scale(1.1); opacity: 1; } }
    @keyframes morphCore { 0% { border-radius: 50%; transform: scale(1) rotate(0deg); } 50% { border-radius: 47% 53% 45% 55%; transform: scale(1.02) rotate(15deg); } 100% { border-radius: 53% 47% 55% 45%; transform: scale(0.98) rotate(-15deg); } }
    @keyframes spinRing { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.03); } 100% { transform: rotate(360deg) scale(1); } }
    @keyframes spinRingReverse { 0% { transform: rotate(360deg) scale(1); } 50% { transform: rotate(180deg) scale(0.97); } 100% { transform: rotate(0deg) scale(1); } }

    /* ════ 第二頁：AI 3D 解析 ════ */
    #sa{position:absolute;inset:0;transform:translateY(100%);transition:transform .65s cubic-bezier(.34,1.2,.64,1);z-index:30;} 
    #sa.show{transform:translateY(0);}
    .sa-bg{position:absolute;inset:0;background:radial-gradient(ellipse 90% 80% at 50% 44%,#0b1c4a 0%,#060a1c 50%,#030310 100%);}
    .sa-grid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(79,195,247,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(79,195,247,.025) 1px,transparent 1px);background-size:30px 30px;}
    #orb-canvas{position:absolute;inset:0;width:100%;height:100%;cursor:grab;touch-action:none;z-index:5;}
    
    .sa-topbar{position:absolute;top:0;left:0;right:0;z-index:25;padding:50px 22px 0;display:flex;align-items:center;justify-content:space-between;pointer-events:none;}
    .bk-btn{width:36px; height:36px; border-radius:50%; border:1px solid rgba(255,255,255,.15); background:rgba(6,12,40,.7); backdrop-filter:blur(14px); color:rgba(255,255,255,.65); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; pointer-events:auto;}
    .sa-badge{font-size:9px; letter-spacing:2px; text-transform:uppercase; color:rgba(79,195,247,.8); background:rgba(6,12,40,.7); backdrop-filter:blur(14px); border:1px solid rgba(79,195,247,.25); padding:6px 14px; border-radius:20px;}
    
    .q-labels-layer{position:absolute;inset:0;z-index:15;pointer-events:none;}
    .q-label{position:absolute; transform:translate(-50%,-50%); pointer-events:auto; cursor:pointer; transition:opacity .28s; user-select:none;}
    .ql-pip{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:6px; height:6px; border-radius:50%; background:rgba(79,195,247,.9); box-shadow:0 0 10px rgba(79,195,247,.8); z-index:2; pointer-events:none;}
    
    /* 保持標籤大小，讓它們豐富且稍微重疊也沒關係 */
    .ql-box{position:relative; background:rgba(3,8,36,.88); backdrop-filter:blur(16px); border:1px solid rgba(79,195,247,.3); padding:6px 10px; max-width:140px; min-width:70px;}
    .ql-box::before, .ql-box::after{content:''; position:absolute; width:8px; height:8px; border-color:rgba(79,195,247,.8); border-style:solid;}
    .ql-box::before{top:-1px; left:-1px; border-width:1.5px 0 0 1.5px;}
    .ql-box::after{bottom:-1px; right:-1px; border-width:0 1.5px 1.5px 0;}
    .ql-num{display:block; font-family:monospace; font-size:8px; letter-spacing:2px; color:rgba(79,195,247,.5); margin-bottom:4px; text-transform:uppercase;}
    .ql-text{display:block; font-size:10px; color:rgba(255,255,255,.8); line-height:1.45;}
    
    .q-label.active .ql-box{border-color:rgba(79,195,247,.85);box-shadow:0 0 22px rgba(79,195,247,.2);}
    .q-label.active .ql-pip{background:#4fc3f7;box-shadow:0 0 12px rgba(79,195,247,1);}
    
    .ans-sheet{position:absolute;bottom:0;left:0;right:0;height:380px;padding-bottom:env(safe-area-inset-bottom);background:rgba(4,10,40,.98);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-top:1px solid rgba(79,195,247,.2);border-radius:28px 28px 0 0;transform:translateY(100%);transition:transform .45s cubic-bezier(.34,1.1,.64,1);z-index:40;display:flex;flex-direction:column;box-shadow: 0 -15px 50px rgba(0,0,0,0.6);}
    .ans-sheet.open{transform:translateY(0);}
    .sheet-top{flex-shrink:0; padding:16px 20px 12px; display:flex; align-items:center; justify-content:space-between;}
    .sheet-handle{width:40px; height:4px; border-radius:2px; background:rgba(255,255,255,.15);}
    .sheet-close{width:32px; height:32px; border-radius:50%; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.05); color:rgba(255,255,255,.5); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center;}
    .sheet-body{flex:1; overflow-y:auto; padding:0 22px 30px; scrollbar-width:none;}
    .sheet-eyebrow{font-family:monospace; font-size:9px; letter-spacing:3px; text-transform:uppercase; color:rgba(79,195,247,.6); margin-bottom:12px;}
    .sheet-q{font-size:17px; font-weight:600; color:#fff; line-height:1.4; margin-bottom:16px;}
    .sheet-divider{height:1px; background:linear-gradient(90deg,rgba(79,195,247,.4) 0%,transparent 85%); margin-bottom:16px;}
    .sheet-ans{font-size:14px; color:rgba(255,255,255,0.8); line-height:1.85; letter-spacing:.3px;}
    .sheet-ans strong{color:rgba(79,195,247,1); font-weight:600;}
    
    .tdots{display:flex; gap:6px; padding:8px 0;}
    .td{width:6px; height:6px; border-radius:50%; background:rgba(79,195,247,.6); animation:tdAnim 1.4s ease-in-out infinite;}
    .td:nth-child(2){animation-delay:.2s;}
    .td:nth-child(3){animation-delay:.4s;}
    @keyframes tdAnim{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-8px);opacity:1}}
    
    .follow-wrap{margin-top:18px; padding-top:15px; border-top:1px solid rgba(255,255,255,0.08);}
    .follow-label{font-family:monospace; font-size:8px; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,.25); margin-bottom:10px;}
    .follow-btn{font-size:12px; color:rgba(79,195,247,.8); padding:10px 14px; margin-bottom:8px; border:1px solid rgba(79,195,247,.15); background:rgba(79,195,247,.05); cursor:pointer; display:block; width:100%; text-align:left; border-radius:8px; transition:all .2s;}
    .sphere-hint{position:absolute; bottom:calc(28px + env(safe-area-inset-bottom)); left:0; right:0; text-align:center; font-family:monospace; font-size:8px; letter-spacing:3px; text-transform:uppercase; color:rgba(79,195,247,.2); pointer-events:none;}
  </style>
</head>
<body>
<div class="phone">

  <div id="sg">
    <div class="g-topbar">
      <div class="aw-nav">
        <button class="n-btn" onclick="changeAW(-1)">‹</button>
        <span class="aw-ct" id="aw-ct">- / -</span>
        <button class="n-btn" onclick="changeAW(1)">›</button>
      </div>
    </div>
    <div class="aw-card">
      <img class="aw-img-blur" id="aw-img-blur" src="" alt="" />
      <img class="aw-img" id="aw-img" src="" alt="" />
      <div class="aw-grad"></div>
      <div class="aw-info"><div class="aw-nm" id="aw-nm">載入中...</div></div>
    </div>
    <div class="audio-pl">
      <div class="prog-area">
          <div class="prog-track" onclick="scrubAudio(event)" id="p-track"><div class="prog-fill" id="pf"></div></div>
          <div class="time-row"><span id="t-now">0:00</span><span id="t-tot">--:--</span></div>
      </div>
      <button class="pl-btn" id="pl-btn" onclick="togglePlay()">▶</button>
    </div>
    <div class="g-body">
      <div class="g-text" id="g-text-container"><p>系統初始化中...</p></div>
    </div>
    <div class="g-bottom" id="g-bottom-orb">
      <div class="mini-orb" onclick="showAI()">
        <div class="mo-glow"></div><div class="mo-core"></div><div class="mo-ring-1"></div><div class="mo-ring-2"></div><div class="mo-highlight"></div>
      </div>
    </div>
  </div>

  <div id="sa">
    <div class="sa-bg"></div><div class="sa-grid"></div><canvas id="orb-canvas"></canvas>
    <div class="sa-topbar">
      <button class="bk-btn" onclick="hideAI()">←</button><span class="sa-badge">AI 深度解析引擎</span>
    </div>
    <div class="q-labels-layer" id="qlayer"></div>
    <div class="sphere-hint">DRAG TO EXPLORE &nbsp;·&nbsp; TAP TO ANALYZE</div>
    <div class="ans-sheet" id="ans-sheet">
      <div class="sheet-top"><div class="sheet-handle"></div><button class="sheet-close" onclick="closeSheet()">✕</button></div>
      <div class="sheet-body">
        <div class="sheet-eyebrow" id="seyebrow">QUERY.00</div>
        <div class="sheet-q" id="sheetq"></div>
        <div class="sheet-divider"></div>
        <div id="sheeta"></div>
      </div>
    </div>
  </div>

</div>

<script>
const WORKER_URL = 'https://artogoai01.ougaga26.workers.dev/'; 
const NUM_Q = 15; // 🚀 擴充為 15 個問題，讓畫面滿滿的超豐富！

let artworks = [];
let curAW = 0;
let currentAudio = new Audio();
let isPlaying = false;

// ════ CSV 資料載入 ════
window.onload = () => {
  Papa.parse("data.csv", {
    download: true, header: true, skipEmptyLines: true,
    complete: function(results) {
      artworks = results.data.map(r => ({
        nm: r.title,
        img: `image/${r.image}.jpg`,
        audio: `audio/${r.audio}.mp3`,
        desc: r.description || "",
        dynamicQs: null, // 用來暫存 AI 生成的問題
        isFetching: false // 追蹤是否正在背景預載
      }));
      if (artworks.length > 0) { 
        initSphere(); 
        changeAW(0); 
      } 
      else { document.getElementById('g-text-container').innerHTML = "<p>無法讀取資料。</p>"; }
    }
  });
};

// ════ 播放器控制 ════
function formatTime(seconds) {
  if (isNaN(seconds)) return "0:00";
  const m = Math.floor(seconds / 60), s = Math.floor(seconds % 60);
  return `${m}:${String(s).padStart(2,'0')}`;
}
currentAudio.addEventListener('loadedmetadata', () => { document.getElementById('t-tot').textContent = formatTime(currentAudio.duration); });
currentAudio.addEventListener('timeupdate', () => {
  const t = currentAudio.currentTime, dur = currentAudio.duration || 1;
  document.getElementById('t-now').textContent = formatTime(t);
  document.getElementById('pf').style.width = `${(t/dur)*100}%`;
});
currentAudio.addEventListener('ended', () => { isPlaying = false; document.getElementById('pl-btn').textContent = '▶'; setTimeout(showAI, 1200); });
function togglePlay(){
  if(isPlaying){ currentAudio.pause(); isPlaying = false; document.getElementById('pl-btn').textContent = '▶'; } 
  else { currentAudio.play(); isPlaying = true; document.getElementById('pl-btn').textContent = '⏸'; }
}
function scrubAudio(e){ 
  const r = document.getElementById('p-track').getBoundingClientRect(); 
  if(currentAudio.duration) currentAudio.currentTime = ((e.clientX - r.left) / r.width) * currentAudio.duration;
}

// ════ 切換畫作與背景預載 ════
function changeAW(d){
  if(artworks.length === 0) return;
  curAW = (curAW + d + artworks.length) % artworks.length;
  const a = artworks[curAW];
  document.getElementById('aw-img').src = a.img;
  document.getElementById('aw-img-blur').src = a.img;
  document.getElementById('aw-nm').textContent = a.nm;
  document.getElementById('aw-ct').textContent = `${curAW + 1} / ${artworks.length}`;
  document.getElementById('g-text-container').innerHTML = a.desc.split('\n').filter(p => p.trim()).map(p => `<p>${p}</p>`).join('');
  
  // 切換畫作時，重置球上的文字狀態
  if(qLabelEls.length > 0) {
    qLabelEls.forEach(el => {
      el.querySelector('.ql-text').textContent = "AI 預載中...";
      el.style.pointerEvents = 'none';
    });
  }

  currentAudio.pause(); currentAudio.src = a.audio; currentAudio.load(); isPlaying = false;
  document.getElementById('pl-btn').textContent = '▶'; document.getElementById('pf').style.width = '0%';

  // 🏆 無感體驗的核心：切換到這幅畫時，立刻在背景偷偷載入問題！
  preloadDynamicQuestions(curAW);
}

// ════ AI 背景偷偷生問題機制 ════
async function preloadDynamicQuestions(artIndex) {
  const curArt = artworks[artIndex];
  
  // 如果已經生成過，或是正在生成中，就不要重複呼叫 API 避免浪費額度
  if (curArt.dynamicQs || curArt.isFetching) return; 

  curArt.isFetching = true;

  const prompt = `你是一個專業的博物館語音導覽員。觀眾正在觀賞展品《${curArt.nm}》，它的背景介紹是：「${curArt.desc}」。請根據這段介紹，生成 ${NUM_Q} 個觀眾可能會想深入追問的問題（例如關於畫家背景、細節、歷史意義等）。
  要求：
  1. 只要輸出問題文字就好，每行一個問題。
  2. 絕對不要加數字編號、不要加項目符號、不要有空行。
  3. 問題請保持口語化且簡短（10-15 字內最佳）。`;

  try {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    const data = await response.json();
    if (!response.ok) throw new Error("API Error");

    const text = data.candidates[0].content.parts[0].text;
    let qs = text.split('\n').map(q => q.replace(/^[\d\.、\-*\s]+/, '').trim()).filter(q => q);
    
    // 確保數量剛好填滿球體
    while(qs.length < NUM_Q) qs.push("這幅作品還有什麼隱藏的細節嗎？");
    qs = qs.slice(0, NUM_Q);

    curArt.dynamicQs = qs; // 存入快取
    curArt.isFetching = false;

    // 🏆 如果觀眾已經點開了 AI 球，而且預載剛好完成，就瞬間幫他更新文字！
    if (curAW === artIndex && document.getElementById('sa').classList.contains('show')) {
      updateQuestionLabels(qs);
    }

  } catch (err) {
    console.error("生成問題失敗:", err);
    curArt.isFetching = false;
    // 如果失敗了，下次觀眾打開球時會顯示失敗，並允許重試
  }
}

function updateQuestionLabels(qs) {
  qs.forEach((q, i) => {
    if(qLabelEls[i]) {
      qLabelEls[i].querySelector('.ql-text').textContent = q;
      qLabelEls[i].style.pointerEvents = 'auto'; // 恢復可點擊
    }
  });
}

// ════ 回答觀眾的問題 ════
async function fetchGeminiAnswer(questionText) {
  const curArt = artworks[curAW];
  const prompt = `你現在是專業導覽員。觀眾正在看展品《${curArt.nm}》。背景：${curArt.desc}。提問：「${questionText}」。請用繁體中文、口語親切地回答(150字內)。回答完畢後，請務必根據展品內容，另外想出「兩個」讓觀眾可以繼續深入了解的延伸提問，並嚴格使用「//」作為分隔符號。格式範例：(你的回答內容)//(你出的延伸問題一)//(你出的延伸問題二)`;

  try {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data.error?.message || response.statusText);
    return data.candidates[0].content.parts[0].text;
  } catch (err) {
    return `⚠️ API 解析失敗 (${err.message})。//重新嘗試//聯絡管理員`;
  }
}

// ════ 介面控制 ════
function showAI(){ 
  currentAudio.pause(); isPlaying = false; document.getElementById('pl-btn').textContent = '▶'; 
  document.getElementById('sa').classList.add('show'); 
  document.getElementById('g-bottom-orb').classList.add('hide'); 
  
  const curArt = artworks[curAW];
  
  if (curArt.dynamicQs) {
    // 🏆 最理想狀況：背景早就偷偷載完了，瞬間顯示！
    updateQuestionLabels(curArt.dynamicQs);
  } else {
    // 如果觀眾「秒按」球體，背景還沒載完，就先顯示等待畫面
    const tempQs = Array(NUM_Q).fill("AI 極速解析中...");
    updateQuestionLabels(tempQs);
    qLabelEls.forEach(el => el.style.pointerEvents = 'none'); // 暫時不給按
    
    // 如果不知為何沒有觸發背景載入，就手動補推一把
    if (!curArt.isFetching) preloadDynamicQuestions(curAW);
  }
}

function hideAI(){ document.getElementById('sa').classList.remove('show'); document.getElementById('g-bottom-orb').classList.remove('hide'); closeSheet(); }

async function renderAnswerSheet(qText, isMain = false, idx = 0) {
  document.getElementById('seyebrow').textContent = isMain ? `QUERY.${String(idx).padStart(2,'0')}` : `FOLLOW-UP ANALYTICS`;
  document.getElementById('sheetq').textContent = qText;
  document.getElementById('sheeta').innerHTML = '<div class="tdots"><div class="td"></div><div class="td"></div><div class="td"></div></div>';
  document.getElementById('ans-sheet').classList.add('open');
  
  const reply = await fetchGeminiAnswer(qText);
  const parts = reply.split('//').map(s => s.trim()).filter(s => s);
  
  let html = `<div class="sheet-ans">${parts[0].replace(/\n/g,'<br>')}</div>`;
  if(parts.length > 1){
    html += `<div class="follow-wrap"><div class="follow-label">// 延伸探索</div>`;
    parts.slice(1).forEach(fq => { 
      const cleanFq = fq.replace(/^[()（）]/, '').replace(/[()（）]$/, '');
      html += `<button class="follow-btn" onclick="renderAnswerSheet('${cleanFq.replace(/'/g, "\\'")}')">${cleanFq}</button>`; 
    });
    html += `</div>`;
  }
  document.getElementById('sheeta').innerHTML = html;
}
function closeSheet(){ document.getElementById('ans-sheet').classList.remove('open'); }

// ════ THREE.JS 3D 空間 (15 個點滿版佈局) ════
let PW = window.innerWidth, PH = window.innerHeight;
let renderer, scene, camera, wire;
let baseY=0, baseX=0, isDrag=false, lastPX=0, lastPY=0, sphereInited=false, qLabelEls=[];
const SPHRAD = 1.35; // 維持大球徑容納 15 個標籤
const SPHERE_Y = 0.28;

// 費氏數列球體分佈演算法 (完美均勻生成 15 個點)
const anchors = (()=>{ 
  const pts=[]; 
  for(let i=0; i<NUM_Q; i++){ 
    const phi = Math.acos(1 - 2*(i+0.5)/NUM_Q);
    const th = Math.PI * (1 + Math.sqrt(5)) * i; 
    pts.push(new THREE.Vector3(Math.sin(phi)*Math.cos(th), Math.cos(phi), Math.sin(phi)*Math.sin(th)).multiplyScalar(SPHRAD)); 
  } 
  return pts; 
})();

function initSphere(){
  if(sphereInited) return;
  sphereInited=true;
  const canvas=document.getElementById('orb-canvas');
  renderer=new THREE.WebGLRenderer({canvas, alpha:true, antialias:true});
  renderer.setSize(PW, PH, false);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(58, PW/PH, 0.1, 100);
  camera.position.set(0, 0, 3.9);
  camera.lookAt(0, SPHERE_Y, 0);

  window.addEventListener('resize', () => { PW=window.innerWidth; PH=window.innerHeight; camera.aspect=PW/PH; camera.updateProjectionMatrix(); renderer.setSize(PW, PH, false); });
  
  wire=new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.IcosahedronGeometry(SPHRAD, 3)), new THREE.LineBasicMaterial({color:0x4fc3f7, transparent:true, opacity:0.25}));
  wire.position.y=SPHERE_Y; scene.add(wire);

  const layer=document.getElementById('qlayer');
  for(let i=0; i<NUM_Q; i++){
    const el=document.createElement('div'); el.className='q-label'; 
    el.innerHTML=`<div class="ql-pip"></div><div class="ql-box"><span class="ql-num">Q.${String(i+1).padStart(2,'0')}</span><span class="ql-text">等待解析...</span></div>`;
    
    el.addEventListener('click', () => {
      const text = el.querySelector('.ql-text').textContent;
      if(text.includes('解析中') || text.includes('預載中') || text.includes('等待')) return; 

      qLabelEls.forEach(l => l.classList.remove('active'));
      el.classList.add('active');
      renderAnswerSheet(text, true, i+1);
    });
    layer.appendChild(el); qLabelEls.push(el);
  }

  canvas.addEventListener('pointerdown',e=>{ isDrag=true; lastPX=e.clientX; lastPY=e.clientY; canvas.setPointerCapture(e.pointerId); });
  canvas.addEventListener('pointermove',e=>{ if(!isDrag) return; baseY+=(e.clientX-lastPX)*0.008; baseX+=(e.clientY-lastPY)*0.005; lastPX=e.clientX; lastPY=e.clientY; });
  canvas.addEventListener('pointerup',()=>{ isDrag=false; });

  (function animate(){
    requestAnimationFrame(animate);
    if(!isDrag){ baseY+=0.0005; baseX=Math.max(-0.42,Math.min(0.42,baseX)); }
    wire.rotation.set(baseX, baseY, 0);
    renderer.render(scene, camera);
    updateLabels(); 
  })();
}

const _v3=new THREE.Vector3(), _euler=new THREE.Euler();
function updateLabels(){
  const sH = document.getElementById('ans-sheet').classList.contains('open') ? 360 : 0;
  _euler.set(wire.rotation.x, wire.rotation.y, 0, 'XYZ');
  anchors.forEach((anchor, i)=>{
    const wPos=anchor.clone().applyEuler(_euler).add(new THREE.Vector3(0, SPHERE_Y, 0));
    const dot=wPos.clone().sub(new THREE.Vector3(0, SPHERE_Y, 0)).normalize().dot(camera.position.clone().sub(wPos).normalize());
    const el=qLabelEls[i];
    if(dot<-0.02){ el.style.opacity='0'; el.style.pointerEvents='none'; return; }
    _v3.copy(wPos).project(camera);
    const sx=(_v3.x+1)/2*PW, sy=-(_v3.y-1)/2*PH;
    if(sy > PH - sH - 30){ el.style.opacity='0'; el.style.pointerEvents='none'; return; }
    el.style.left=sx+'px'; el.style.top=sy+'px'; el.style.opacity=Math.min(1, (dot+0.02)/0.55).toString(); 
  });
}
