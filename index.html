<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>浮世繪 AI 導覽</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html, body { width: 100%; height: 100%; overflow: hidden; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Noto Sans TC', BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #07070f; }
    .phone { width: 100%; height: 100dvh; position: relative; overflow: hidden; }

    /* ═══════════════ SCREEN 1 — AUDIO GUIDE ═══════════════ */
    #sg{position:absolute;inset:0;background:linear-gradient(155deg,#0d1b4b 0%,#0a3060 45%,#0c4870 80%,#071a3a 100%);display:flex;flex-direction:column;}
    .g-topbar{padding:50px 22px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
    .g-tag{font-size:10px;letter-spacing:2.5px;color:rgba(255,255,255,.35);text-transform:uppercase;}
    .aw-nav{display:flex;align-items:center;gap:8px;}
    .n-btn{width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:rgba(255,255,255,.8);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;}
    .n-btn:active{background:rgba(255,255,255,.2);}
    .aw-ct{font-size:11px;color:rgba(255,255,255,.35);}
    .aw-card{margin:0 auto; width: calc(100% - 44px); max-width: 600px; border-radius:20px;overflow:hidden;height:195px;position:relative;flex-shrink:0;box-shadow:0 12px 40px rgba(0,0,0,.45);}
    .aw-img{width:100%;height:100%;object-fit:cover;display:block;}
    .aw-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,22,70,.92) 0%,rgba(8,22,70,.12) 55%,transparent 100%);}
    .aw-info{position:absolute;bottom:14px;left:16px;right:16px;}
    .aw-nm{font-size:19px;font-weight:700;color:#fff;letter-spacing:1px;line-height:1.25;text-shadow:0 2px 10px rgba(0,0,0,.5);}
    .aw-mt{font-size:11px;color:rgba(255,255,255,.5);margin-top:3px;letter-spacing:.5px;}
    .audio-pl{margin:14px auto 0; width: calc(100% - 44px); max-width: 600px; padding:13px 16px;background:rgba(255,255,255,.07);backdrop-filter:blur(20px);border-radius:16px;border:1px solid rgba(255,255,255,.1);flex-shrink:0;}
    .prog-track{height:3px;background:rgba(255,255,255,.12);border-radius:2px;margin-bottom:11px;cursor:pointer;}
    .prog-fill{height:100%;background:linear-gradient(90deg,#4fc3f7,#81d4fa);border-radius:2px;width:0%;position:relative; pointer-events: none;}
    .prog-fill::after{content:'';position:absolute;right:-4px;top:50%;transform:translateY(-50%);width:8px;height:8px;border-radius:50%;background:#81d4fa;box-shadow:0 0 8px rgba(129,212,250,.9);}
    .audio-row{display:flex;align-items:center;gap:12px;}
    .pl-btn{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#4fc3f7,#0288d1);border:none;color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(79,195,247,.4);transition:transform .15s;}
    .pl-btn:active{transform:scale(.93);}
    .t-now{font-size:12px;color:rgba(255,255,255,.5);font-variant-numeric:tabular-nums;}
    .t-tot{font-size:11px;color:rgba(255,255,255,.22);margin-left:auto;}
    
    .g-body{flex:1;overflow-y:auto;margin:14px auto 0;padding: 0 22px 130px; max-width: 600px; scrollbar-width:none;}
    .g-body::-webkit-scrollbar{display:none;}
    .g-text{font-size:14px;line-height:1.95;color:rgba(255,255,255,.7);letter-spacing:.25px;}
    .g-text p{margin-bottom:14px;}
    
    .g-bottom {
      position: absolute; bottom: 0; left: 0; right: 0; padding-top: 80px; padding-bottom: calc(30px + env(safe-area-inset-bottom)); 
      display: flex; justify-content: center; align-items: center;
      background: linear-gradient(to top, #071a3a 10%, rgba(7, 26, 58, 0.6) 50%, transparent 100%);
      transition: opacity 0.4s ease, transform 0.4s ease; z-index: 20; pointer-events: none; 
    }
    .g-bottom.hide { opacity: 0; pointer-events: none; transform: translateY(20px); }

    /* 科技感 AI 液態按鈕 */
    .mini-orb { width: 60px; height: 60px; position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; transition: transform 0.2s; pointer-events: auto; }
    .mini-orb:active { transform: scale(0.95); }
    .mo-glow { position: absolute; width: 105px; height: 105px; border-radius: 50%; background: radial-gradient(circle, rgba(138, 43, 226, 0.4) 0%, rgba(0, 191, 255, 0.15) 45%, transparent 70%); animation: pulseGlow 3s ease-in-out infinite alternate; pointer-events: none; }
    .mo-core { position: absolute; width: 46px; height: 46px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #e0b0ff 0%, #a855f7 25%, #4338ca 65%, #1e1b4b 100%); box-shadow: inset -3px -3px 8px rgba(0,0,0,0.6), inset 4px 4px 10px rgba(255,255,255,0.7), 0 0 14px rgba(168, 85, 247, 0.5); animation: morphCore 6s ease-in-out infinite alternate; }
    .mo-ring-1 { position: absolute; width: 56px; height: 56px; border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; border: 2px solid rgba(255,255,255,0.9); box-shadow: 0 0 8px #7dd3fc, inset 0 0 8px #7dd3fc; animation: spinRing 4s linear infinite; mix-blend-mode: screen; }
    .mo-ring-2 { position: absolute; width: 60px; height: 60px; border-radius: 60% 40% 30% 70% / 50% 60% 40% 50%; border: 2px solid rgba(192, 132, 252, 0.8); box-shadow: 0 0 12px rgba(168, 85, 247, 0.8), inset 0 0 10px rgba(168, 85, 247, 0.5); animation: spinRingReverse 6s linear infinite; mix-blend-mode: screen; }
    .mo-highlight { position: absolute; width: 46px; height: 46px; border-radius: 50%; background: radial-gradient(circle at 50% 15%, rgba(255,255,255,0.6) 0%, transparent 35%); pointer-events: none; z-index: 2; }
    @keyframes pulseGlow { 0% { transform: scale(0.9); opacity: 0.7; } 100% { transform: scale(1.1); opacity: 1; } }
    @keyframes morphCore { 0% { border-radius: 50%; transform: scale(1) rotate(0deg); } 50% { border-radius: 47% 53% 45% 55%; transform: scale(1.02) rotate(15deg); } 100% { border-radius: 53% 47% 55% 45%; transform: scale(0.98) rotate(-15deg); } }
    @keyframes spinRing { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.03); } 100% { transform: rotate(360deg) scale(1); } }
    @keyframes spinRingReverse { 0% { transform: rotate(360deg) scale(1); } 50% { transform: rotate(180deg) scale(0.97); } 100% { transform: rotate(0deg) scale(1); } }

    /* ═══════════════ SCREEN 2 — FULL-SCREEN SPHERE ═══════════════ */
    #sa{position:absolute;inset:0;transform:translateY(100%);transition:transform .65s cubic-bezier(.34,1.2,.64,1);z-index:30;} 
    #sa.show{transform:translateY(0);}
    .sa-bg{position:absolute;inset:0;background:radial-gradient(ellipse 90% 80% at 50% 44%,#0b1c4a 0%,#060a1c 50%,#030310 100%);}
    .sa-grid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(79,195,247,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(79,195,247,.022) 1px,transparent 1px);background-size:30px 30px;}
    #orb-canvas{position:absolute;inset:0;width:100%;height:100%;cursor:grab;touch-action:none;z-index:5;}
    #orb-canvas:active{cursor:grabbing;}
    .sa-topbar{position:absolute;top:0;left:0;right:0;z-index:25;padding:50px 22px 0;display:flex;align-items:center;justify-content:space-between;pointer-events:none;}
    .bk-btn{width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(6,12,40,.7);backdrop-filter:blur(14px);color:rgba(255,255,255,.65);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;pointer-events:auto;}
    .bk-btn:active{background:rgba(255,255,255,.14);}
    .sa-badge{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(79,195,247,.7);background:rgba(6,12,40,.7);backdrop-filter:blur(14px);border:1px solid rgba(79,195,247,.22);padding:5px 12px;border-radius:20px;}
    
    .q-labels-layer{position:absolute;inset:0;z-index:15;pointer-events:none;}
    .q-label{position:absolute;transform:translate(-50%,-50%);pointer-events:auto;cursor:pointer;transition:opacity .28s;user-select:none;}
    .ql-pip{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:5px;height:5px;border-radius:50%;background:rgba(79,195,247,.9);box-shadow:0 0 7px rgba(79,195,247,.8);z-index:2;pointer-events:none;}
    .ql-box{position:relative;background:rgba(3,8,36,.84);backdrop-filter:blur(16px);border:1px solid rgba(79,195,247,.3);padding:6px 11px 7px;max-width:152px;min-width:70px;}
    .ql-box::before{content:'';position:absolute;top:-1px;left:-1px;width:7px;height:7px;border-top:1.5px solid rgba(79,195,247,.8);border-left:1.5px solid rgba(79,195,247,.8);}
    .ql-box::after{content:'';position:absolute;bottom:-1px;right:-1px;width:7px;height:7px;border-bottom:1.5px solid rgba(79,195,247,.8);border-right:1.5px solid rgba(79,195,247,.8);}
    .ql-tr{position:absolute;top:-1px;right:-1px;width:7px;height:7px;border-top:1.5px solid rgba(79,195,247,.8);border-right:1.5px solid rgba(79,195,247,.8);}
    .ql-bl{position:absolute;bottom:-1px;left:-1px;width:7px;height:7px;border-bottom:1.5px solid rgba(79,195,247,.8);border-left:1.5px solid rgba(79,195,247,.8);}
    .ql-num{display:block;font-family:'Courier New',monospace;font-size:7px;letter-spacing:2.2px;color:rgba(79,195,247,.45);text-transform:uppercase;margin-bottom:3px;}
    .ql-text{display:block;font-size:10.5px;color:rgba(255,255,255,.78);line-height:1.42;letter-spacing:.15px;}
    .q-label.active .ql-box{border-color:rgba(79,195,247,.85);box-shadow:0 0 22px rgba(79,195,247,.2);}
    .q-label.active .ql-box::before,.q-label.active .ql-box::after{border-color:rgba(79,195,247,1);}
    .q-label.active .ql-tr,.q-label.active .ql-bl{border-color:rgba(79,195,247,1);}
    .q-label.active .ql-num{color:rgba(79,195,247,.9);}
    .q-label.active .ql-text{color:#fff;}
    .q-label.active .ql-pip{background:#4fc3f7;box-shadow:0 0 12px rgba(79,195,247,1);}
    .sphere-hint{position:absolute;bottom:calc(24px + env(safe-area-inset-bottom));left:0;right:0;text-align:center;font-family:'Courier New',monospace;font-size:7.5px;letter-spacing:2.8px;text-transform:uppercase;color:rgba(79,195,247,.15);z-index:10;pointer-events:none;}

    /* ── Answer Bottom Sheet ── */
    .ans-sheet{position:absolute;bottom:0;left:0;right:0;height: 350px;padding-bottom: env(safe-area-inset-bottom);background:rgba(4,10,40,.97);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-top:1px solid rgba(79,195,247,.16);border-radius:26px 26px 0 0;transform:translateY(100%);transition:transform .42s cubic-bezier(.34,1.1,.64,1);z-index:40;display:flex;flex-direction:column;}
    .ans-sheet.open{transform:translateY(0);}
    .sheet-top{flex-shrink:0;padding:14px 20px 11px;display:flex;align-items:center;justify-content:space-between;}
    .sheet-handle{width:38px;height:3px;border-radius:2px;background:rgba(255,255,255,.15);}
    .sheet-close{width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:rgba(255,255,255,.4);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .18s;}
    .sheet-close:active{background:rgba(255,255,255,.14);}
    .sheet-body{flex:1;overflow-y:auto;padding:0 20px 28px;scrollbar-width:none;}
    .sheet-body::-webkit-scrollbar{display:none;}
    .sheet-eyebrow{font-family:'Courier New',monospace;font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(79,195,247,.5);margin-bottom:9px;}
    .sheet-q{font-size:15.5px;font-weight:600;color:#fff;line-height:1.38;margin-bottom:14px;letter-spacing:.2px;}
    .sheet-divider{height:1px;background:linear-gradient(90deg,rgba(79,195,247,.3) 0%,transparent 80%);margin-bottom:14px;}
    .sheet-ans{font-size:13px;color:rgba(255,255,255,.72);line-height:1.82;letter-spacing:.18px;}
    .sheet-ans strong{color:rgba(79,195,247,.95);font-weight:600;}

    /* 思考中打字點點 */
    .tdots{display:flex;gap:5px;padding:5px 0;}
    .td{width:5px;height:5px;border-radius:50%;background:rgba(79,195,247,.55);animation:tdAnim 1.3s ease-in-out infinite;}
    .td:nth-child(2){animation-delay:.18s;}
    .td:nth-child(3){animation-delay:.36s;}
    @keyframes tdAnim{0%,60%,100%{transform:translateY(0);opacity:.35}30%{transform:translateY(-6px);opacity:1}}

    /* 延伸探索 */
    .follow-wrap{margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,.05);}
    .follow-label{font-family:'Courier New',monospace;font-size:7.5px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.2);margin-bottom:8px;}
    .follow-btn{font-size:11.5px;color:rgba(79,195,247,.72);padding:8px 11px;margin-bottom:5px;border:1px solid rgba(79,195,247,.14);background:rgba(79,195,247,.04);cursor:pointer;display:block;width:100%;text-align:left;transition:all .18s;font-family:inherit;}
    .follow-btn:active{background:rgba(79,195,247,.13);color:#4fc3f7;}
  </style>
</head>
<body>
<div class="phone">

  <div id="sg">
    <div class="g-topbar">
      <div class="g-tag">AI 語音導覽</div>
      <div class="aw-nav">
        <button class="n-btn" onclick="changeAW(-1)">‹</button>
        <span class="aw-ct" id="aw-ct">- / -</span>
        <button class="n-btn" onclick="changeAW(1)">›</button>
      </div>
    </div>

    <div class="aw-card">
      <img class="aw-img" id="aw-img" src="" alt="" />
      <div class="aw-grad"></div>
      <div class="aw-info">
        <div class="aw-nm" id="aw-nm">載入中...</div>
        <div class="aw-mt" id="aw-mt"></div>
      </div>
    </div>

    <div class="audio-pl">
      <div class="prog-track" onclick="scrubAudio(event)" id="p-track">
        <div class="prog-fill" id="pf"></div>
      </div>
      <div class="audio-row">
        <button class="pl-btn" id="pl-btn" onclick="togglePlay()">▶</button>
        <span class="t-now" id="t-now">0:00</span>
        <span class="t-tot" id="t-tot">--:--</span>
      </div>
    </div>

    <div class="g-body">
      <div class="g-text" id="g-text-container">
        <p>資料載入中，請稍候...</p>
      </div>
    </div>

    <div class="g-bottom" id="g-bottom-orb">
      <div class="mini-orb" onclick="showAI()">
        <div class="mo-glow"></div>
        <div class="mo-core"></div>
        <div class="mo-ring-1"></div>
        <div class="mo-ring-2"></div>
        <div class="mo-highlight"></div>
      </div>
    </div>
  </div>

  <div id="sa">
    <div class="sa-bg"></div>
    <div class="sa-grid"></div>
    <canvas id="orb-canvas"></canvas>
    <div class="sa-topbar">
      <button class="bk-btn" onclick="hideAI()">←</button>
      <span class="sa-badge">AI 深度解析</span>
    </div>
    <div class="q-labels-layer" id="qlayer"></div>
    <div class="sphere-hint">DRAG TO EXPLORE &nbsp;·&nbsp; TAP TO REVEAL</div>

    <div class="ans-sheet" id="ans-sheet">
      <div class="sheet-top">
        <div class="sheet-handle"></div>
        <button class="sheet-close" onclick="closeSheet()">✕</button>
      </div>
      <div class="sheet-body">
        <div class="sheet-eyebrow" id="seyebrow">QUERY.00</div>
        <div class="sheet-q" id="sheetq"></div>
        <div class="sheet-divider"></div>
        <div id="sheeta"></div>
      </div>
    </div>
  </div>

</div>

<script>
// ==========================================
// 1. GEMINI API 設定 (請在此貼上你的金鑰)
// ==========================================
const GEMINI_API_KEY = 'AIzaSyDVpS21zj9HEzmIyvkI82JsAjtPcAsvdlA'; 

// ==========================================
// 2. 泛用型 AI 問題集 (適配任何畫作與介紹)
// ==========================================
const genericQuestions = [
  "可以幫我總結一下這段導覽的核心重點嗎？",
  "這段介紹裡，有什麼最特別或有趣的故事？",
  "這些歷史背景對現代有什麼影響？",
  "這位畫家（或這個流派）最大的特色是什麼？",
  "當時的日本社會是如何看待這些藝術的？",
  "有什麼容易被忽略的細節可以分享嗎？",
  "這些作品使用了什麼特殊的創作技法？",
  "這段內容傳達了怎樣的哲理或精神？",
  "這和西方藝術有什麼關聯或相互影響嗎？",
  "為什麼這些作品會成為傳世經典？"
];

// ==========================================
// 3. 資料讀取與狀態管理 (PapaParse 讀取 CSV)
// ==========================================
let artworks = [];
let curAW = 0;

window.onload = () => {
  Papa.parse("data.csv", {
    download: true,
    header: true,
    complete: function(results) {
      // 過濾掉空行，並將 CSV 欄位對應到我們的變數
      artworks = results.data.filter(r => r.title).map(r => ({
        nm: r.title,
        mt: '浮世繪沈浸展',
        img: `image/${r.image}.jpg`,   // 假設圖片是 .jpg
        audio: `audio/${r.audio}.mp3`, // 假設音檔是 .mp3
        desc: r.description,
        idx: r.order
      }));
      
      if (artworks.length > 0) {
        changeAW(0); 
        initSphere(); // 提早初始化 3D 節省切換時間
      } else {
        document.getElementById('g-text-container').innerHTML = "<p>無法讀取 data.csv，請確認檔案位置。</p>";
      }
    }
  });
};

// ==========================================
// 4. 真實 Audio 播放器控制
// ==========================================
let currentAudio = new Audio();
let isPlaying = false;

function formatTime(seconds) {
  if (isNaN(seconds)) return "0:00";
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${String(s).padStart(2,'0')}`;
}

currentAudio.addEventListener('loadedmetadata', () => {
  document.getElementById('t-tot').textContent = formatTime(currentAudio.duration);
});

currentAudio.addEventListener('timeupdate', () => {
  const t = currentAudio.currentTime;
  const dur = currentAudio.duration || 1;
  document.getElementById('t-now').textContent = formatTime(t);
  document.getElementById('pf').style.width = `${(t/dur)*100}%`;
});

currentAudio.addEventListener('ended', () => {
  isPlaying = false;
  document.getElementById('pl-btn').textContent = '▶';
  setTimeout(showAI, 1000); // 播完一秒後自動跳出 AI
});

function togglePlay(){
  if(isPlaying){
    currentAudio.pause();
    isPlaying = false;
    document.getElementById('pl-btn').textContent = '▶';
  } else {
    currentAudio.play();
    isPlaying = true;
    document.getElementById('pl-btn').textContent = '⏸';
  }
}

function scrubAudio(e){ 
  const r = document.getElementById('p-track').getBoundingClientRect(); 
  const clickRatio = (e.clientX - r.left) / r.width;
  if(currentAudio.duration) {
    currentAudio.currentTime = clickRatio * currentAudio.duration;
  }
}

function changeAW(d){
  if(artworks.length === 0) return;
  curAW = (curAW + d + artworks.length) % artworks.length;
  const a = artworks[curAW];
  
  document.getElementById('aw-img').src = a.img;
  document.getElementById('aw-nm').textContent = a.nm;
  document.getElementById('aw-mt').textContent = a.mt;
  document.getElementById('aw-ct').textContent = `${curAW + 1} / ${artworks.length}`;
  
  // 處理 CSV 裡的換行符號
  const descContainer = document.getElementById('g-text-container');
  descContainer.innerHTML = a.desc.split('\n').filter(p => p.trim()).map(p => `<p>${p}</p>`).join('');

  // 切換音檔
  currentAudio.pause();
  currentAudio.src = a.audio;
  currentAudio.load();
  isPlaying = false;
  document.getElementById('pl-btn').textContent = '▶';
  document.getElementById('pf').style.width = '0%';
  document.getElementById('t-now').textContent = '0:00';
  document.getElementById('t-tot').textContent = '--:--';
}

// ==========================================
// 5. 串接 Gemini API 取得真實回答
// ==========================================
async function fetchGeminiAnswer(questionText) {
  if (GEMINI_API_KEY === 'YOUR_GEMINI_API_KEY_HERE') {
    return "系統提示：您尚未填寫 Gemini API Key，請至程式碼中修改。//請填寫金鑰//以開啟 AI 功能";
  }

  const curArt = artworks[curAW];
  const prompt = `你是專業的展覽AI導覽員，觀眾正在觀賞展品《${curArt.nm}》。
展品介紹如下：
${curArt.desc}

觀眾提問：「${questionText}」
請用繁體中文，以生動、專業的口吻回答觀眾（約100-150字）。
回答完後，請提供2個推薦的「延伸探索問題」，格式請嚴格遵守：在回答最後加上「//延伸問題1//延伸問題2」。`;

  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
  
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    return data.candidates[0].content.parts[0].text;
  } catch (err) {
    console.error(err);
    return "抱歉，AI 導覽員目前連線異常，請稍後再試。//重新連線//尋求工作人員協助"; 
  }
}

// ==========================================
// 6. UI 切換與 AI 問答面板邏輯
// ==========================================
function showAI(){ 
  currentAudio.pause(); isPlaying = false; document.getElementById('pl-btn').textContent = '▶';
  document.getElementById('sa').classList.add('show'); 
  document.getElementById('g-bottom-orb').classList.add('hide'); 
}
function hideAI(){ 
  document.getElementById('sa').classList.remove('show'); 
  document.getElementById('g-bottom-orb').classList.remove('hide'); 
  closeSheet(); 
}

async function renderAnswerSheet(qText, isMainQuestion = false, qIndex = 0) {
  if(isMainQuestion) {
    document.getElementById('seyebrow').textContent = `QUERY.${String(qIndex).padStart(2,'0')} · AI 解析`;
  } else {
    document.getElementById('seyebrow').textContent = `FOLLOW-UP · AI 解析`;
  }
  
  document.getElementById('sheetq').textContent = qText;
  // 顯示打字 Loading 動畫
  document.getElementById('sheeta').innerHTML = '<div class="tdots"><div class="td"></div><div class="td"></div><div class="td"></div></div>';
  document.getElementById('ans-sheet').classList.add('open');

  // 等待 Gemini API 回應
  const replyText = await fetchGeminiAnswer(qText);
  
  // 解析 API 回傳的文字與延伸問題 (以 // 切割)
  const parts = replyText.split('//').map(s => s.trim()).filter(s => s);
  const ansContent = parts[0];
  const followUps = parts.slice(1);

  let html = `<div class="sheet-ans">${ansContent.replace(/\n/g,'<br>')}</div>`;
  if(followUps.length > 0){
    html += `<div class="follow-wrap"><div class="follow-label">// 延伸探索</div>`;
    followUps.forEach(fq => {
      // 綁定延伸問題的點擊事件
      html += `<button class="follow-btn" onclick="renderAnswerSheet('${fq.replace(/'/g, "\\'")}')">${fq}</button>`;
    });
    html += `</div>`;
  }
  document.getElementById('sheeta').innerHTML = html;
}

function closeSheet(){
  document.getElementById('ans-sheet').classList.remove('open');
}

// ==========================================
// 7. THREE.JS SPHERE (3D 空間與標籤)
// ==========================================
let PW = window.innerWidth, PH = window.innerHeight;
let renderer, scene, camera, wire;
let baseY=0, baseX=0, velY=0, velX=0;
let isDrag=false, lastPX=0, lastPY=0;
let mouseX=0, mouseY=0, hoverX=0, hoverY=0;
let sphereInited=false;
let qLabelEls=[];

const SPHRAD = 1.25;
const SPHERE_Y = 0.28;
const anchors = (()=>{
  const pts=[];
  for(let i=0;i<10;i++){
    const phi=Math.acos(1-2*(i+0.5)/10);
    const theta=Math.PI*(1+Math.sqrt(5))*i + 0.4;
    pts.push(new THREE.Vector3(Math.sin(phi)*Math.cos(theta), Math.cos(phi), Math.sin(phi)*Math.sin(theta)).multiplyScalar(SPHRAD));
  }
  return pts;
})();

function initSphere(){
  if(sphereInited) return;
  sphereInited=true;

  const canvas=document.getElementById('orb-canvas');
  canvas.width=PW; canvas.height=PH;

  renderer=new THREE.WebGLRenderer({canvas, alpha:true, antialias:true});
  renderer.setSize(PW, PH, false);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0,0);

  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(58, PW/PH, 0.1, 100);
  camera.position.set(0, 0, 3.9);
  camera.lookAt(0, SPHERE_Y, 0);

  window.addEventListener('resize', () => {
    PW = window.innerWidth; PH = window.innerHeight;
    if(camera && renderer) { camera.aspect = PW / PH; camera.updateProjectionMatrix(); renderer.setSize(PW, PH, false); }
  });

  const geo=new THREE.IcosahedronGeometry(SPHRAD, 3);
  const edges=new THREE.EdgesGeometry(geo);
  wire=new THREE.LineSegments(edges, new THREE.LineBasicMaterial({color:0x4fc3f7, transparent:true, opacity:0.28}));
  wire.position.y=SPHERE_Y;
  scene.add(wire);

  const innerMesh=new THREE.Mesh(new THREE.SphereGeometry(SPHRAD*0.96, 32, 32), new THREE.MeshBasicMaterial({color:0x060e30, transparent:true, opacity:0.6}));
  innerMesh.position.y=SPHERE_Y;
  scene.add(innerMesh);

  const traceColors=[0x7c4dff, 0x00bcd4, 0x4fc3f7];
  for(let ti=0;ti<3;ti++){
    const pts=[];
    for(let p=0;p<22;p++){
      const th2=Math.random()*Math.PI*2, ph2=Math.acos(2*Math.random()-1);
      pts.push(new THREE.Vector3(SPHRAD*Math.sin(ph2)*Math.cos(th2), SPHRAD*Math.cos(ph2), SPHRAD*Math.sin(ph2)*Math.sin(th2)));
    }
    const curve=new THREE.CatmullRomCurve3(pts,true);
    const tLine=new THREE.Line(new THREE.BufferGeometry().setFromPoints(curve.getPoints(110)), new THREE.LineBasicMaterial({color:traceColors[ti], transparent:true, opacity:0.15}));
    tLine.position.y=SPHERE_Y; tLine.userData.isTrace=true;
    scene.add(tLine);
  }

  const layer=document.getElementById('qlayer');
  qLabelEls=[];
  genericQuestions.forEach((qText,i)=>{
    const el=document.createElement('div');
    el.className='q-label';
    el.style.cssText='opacity:0;pointer-events:none;';
    el.innerHTML=`<div class="ql-pip"></div><div class="ql-box"><span class="ql-tr"></span><span class="ql-bl"></span><span class="ql-num">Q.${String(i+1).padStart(2,'0')}</span><span class="ql-text">${qText}</span></div>`;
    el.addEventListener('click', () => renderAnswerSheet(qText, true, i+1));
    layer.appendChild(el);
    qLabelEls.push(el);
  });

  canvas.addEventListener('pointerdown',e=>{ isDrag=true; lastPX=e.clientX; lastPY=e.clientY; velX=velY=0; canvas.setPointerCapture(e.pointerId); });
  canvas.addEventListener('pointermove',e=>{
    mouseX=(e.clientX-PW/2)/PW; mouseY=(e.clientY-PH/2)/PH;
    if(!isDrag) return;
    velY=(e.clientX-lastPX)*0.008; velX=(e.clientY-lastPY)*0.005; 
    baseY+=velY; baseX+=velX; lastPX=e.clientX; lastPY=e.clientY;
  });
  canvas.addEventListener('pointerup',()=>{ isDrag=false; });
  canvas.addEventListener('pointercancel',()=>{ isDrag=false; });

  (function animate(){
    requestAnimationFrame(animate);
    if(!isDrag){
      velY*=0.90; velX*=0.90;
      baseY+=0.0005+velY; baseX+=velX; 
      baseX=Math.max(-0.42,Math.min(0.42,baseX));
    }
    hoverX+=(mouseY*0.22-hoverX)*0.042; hoverY+=(mouseX*0.15-hoverY)*0.042;
    wire.rotation.set(baseX+hoverX, baseY+hoverY, 0);
    scene.children.forEach(c=>{ if(c.userData&&c.userData.isTrace){ c.rotation.set((baseX+hoverX)*0.45, (baseY+hoverY)*0.38, 0); } });
    renderer.render(scene, camera);
    updateLabels(); 
  })();
}

const _v3=new THREE.Vector3(), _euler=new THREE.Euler();
function updateLabels(){
  const sheetH = document.getElementById('ans-sheet').classList.contains('open') ? 360 : 0;
  const maxY = PH - sheetH - 20;
  _euler.set(wire.rotation.x, wire.rotation.y, 0, 'XYZ');
  const sphereCenter=new THREE.Vector3(0, SPHERE_Y, 0);

  anchors.forEach((anchor, i)=>{
    const worldPos=anchor.clone().applyEuler(_euler).add(sphereCenter);
    const dot=worldPos.clone().sub(sphereCenter).normalize().dot(camera.position.clone().sub(worldPos).normalize());
    const el=qLabelEls[i];
    
    if(dot<-0.02){ el.style.opacity='0'; el.style.pointerEvents='none'; return; }
    
    _v3.copy(worldPos).project(camera);
    const sx=(_v3.x+1)/2*PW, sy=-(_v3.y-1)/2*PH;
    
    if(sx<12 || sx>PW-12 || sy<92 || sy>maxY){ el.style.opacity='0'; el.style.pointerEvents='none'; return; }
    
    el.style.left=sx+'px'; el.style.top=sy+'px';
    el.style.opacity=Math.min(1, (dot+0.02)/0.55).toString();
    el.style.pointerEvents='auto';
  });
}
