<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>浮世繪 AI 導覽</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html, body { width: 100%; height: 100%; overflow: hidden; background: #07070f; font-family: -apple-system, sans-serif;}
    .phone { width: 100%; height: 100dvh; position: relative; overflow: hidden; }

    /* ════ 導覽介面 ════ */
    #sg{position:absolute;inset:0;background:linear-gradient(155deg,#0d1b4b 0%,#0a3060 45%,#0c4870 80%,#071a3a 100%);display:flex;flex-direction:column;}
    .aw-nav{display:flex; align-items:center; gap:8px; padding: 15px 22px 10px; justify-content: flex-end;}
    .n-btn{width:32px; height:32px; border-radius:50%; border:1px solid rgba(255,255,255,.18); background:rgba(255,255,255,.07); color:#fff; cursor:pointer;}
    .aw-card{margin:0 auto; width: calc(100% - 44px); max-width: 500px; aspect-ratio: 1/1; border-radius:24px; overflow:hidden; position:relative; flex-shrink:0;}
    .aw-img-blur {position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: blur(30px); opacity: 0.5;}
    .aw-img{ position: relative; width:100%; height:100%; object-fit:contain; z-index: 1; }
    .aw-info{position:absolute;bottom:18px;left:20px;z-index: 3; color: #fff;}
    
    /* 修正後的播放條 */
    .audio-pl{margin:14px auto 0; width: calc(100% - 44px); max-width: 500px; padding:12px 18px; background:rgba(255,255,255,.07); border-radius:18px; display: flex; align-items: center; gap: 15px; z-index: 10;}
    .prog-area { flex: 1; }
    .prog-track{height:6px; background:rgba(255,255,255,.1); border-radius:3px; cursor:pointer; position: relative; width: 100%;}
    .prog-fill{height:100%; background:#4fc3f7; border-radius:3px; width:0%; pointer-events: none;}
    .time-row { display: flex; justify-content: space-between; font-size: 10px; color: rgba(255,255,255,.4); margin-top: 5px; }
    .pl-btn{width:40px; height:40px; border-radius:50%; background:#4fc3f7; border:none; color:#fff; font-size:18px; font-weight: bold; cursor:pointer; flex-shrink: 0;}

    .g-body{flex:1; overflow-y:auto; padding: 15px 22px 100px;}
    .g-text{font-size:15px; line-height:1.8; color:rgba(255,255,255,.8);}

    /* ════ AI 3D 解析 ════ */
    #sa{position:absolute;inset:0;transform:translateY(100%);transition:transform .6s ease;z-index:30;} 
    #sa.show{transform:translateY(0);}
    .sa-bg{position:absolute;inset:0;background:#030310;}
    #orb-canvas{position:absolute;inset:0;width:100%;height:100%;z-index:5; touch-action: none;}
    
    /* 標籤樣式回縮 */
    .q-label{position:absolute; transform:translate(-50%,-50%); pointer-events:none;}
    .ql-box{background:rgba(3,8,36,.9); border:1px solid rgba(79,195,247,.4); padding:8px 12px; max-width:150px; pointer-events: auto;}
    .ql-num{display:block; font-size:9px; color:#4fc3f7; margin-bottom:2px;}
    .ql-text{display:block; font-size:12px; color:#fff; line-height:1.4;}

    .ans-sheet{position:absolute;bottom:0;left:0;right:0;height:380px;background:#040a28;border-top:1px solid #4fc3f7;transform:translateY(100%);transition:transform .4s;z-index:40;padding: 20px;}
    .ans-sheet.open{transform:translateY(0);}
    .sheet-close{float:right; color:#fff; cursor:pointer; font-size:20px; border:none; background:none;}
  </style>
</head>
<body>
<div class="phone">
  <div id="sg">
    <div class="aw-nav">
      <button class="n-btn" onclick="changeAW(-1)">◀</button>
      <span id="aw-ct" style="color:#fff; font-size:12px;">- / -</span>
      <button class="n-btn" onclick="changeAW(1)">▶</button>
    </div>
    <div class="aw-card">
      <img class="aw-img-blur" id="aw-img-blur" src="" />
      <img class="aw-img" id="aw-img" src="" />
      <div class="aw-info"><div id="aw-nm">載入中...</div></div>
    </div>
    <div class="audio-pl">
      <div class="prog-area">
          <div class="prog-track" id="p-track"><div class="prog-fill" id="pf"></div></div>
          <div class="time-row"><span id="t-now">0:00</span><span id="t-tot">--:--</span></div>
      </div>
      <button class="pl-btn" id="pl-btn" onclick="togglePlay()">II</button>
    </div>
    <div class="g-body"><div class="g-text" id="g-text-container"></div></div>
    <div style="position:absolute; bottom:30px; left:50%; transform:translateX(-50%); z-index:20;">
      <div style="width:60px; height:60px; background:#4fc3f7; border-radius:50%; cursor:pointer;" onclick="showAI()"></div>
    </div>
  </div>

  <div id="sa">
    <div class="sa-bg"></div><canvas id="orb-canvas"></canvas>
    <div class="sa-topbar" style="position:absolute; top:20px; left:20px; z-index:25;">
      <button class="n-btn" onclick="hideAI()">X</button>
    </div>
    <div class="q-labels-layer" id="qlayer"></div>
    <div class="ans-sheet" id="ans-sheet">
      <button class="sheet-close" onclick="closeSheet()">×</button>
      <div id="sheetq" style="color:#4fc3f7; font-weight:bold; margin-bottom:15px;"></div>
      <div id="sheeta" style="color:#fff; font-size:14px; line-height:1.6;"></div>
    </div>
  </div>
</div>

<script>
const WORKER_URL = 'https://artogoai01.ougaga26.workers.dev/'; 
const NUM_Q = 10; 
let artworks = [], curAW = 0, currentAudio = new Audio(), isPlaying = false, preloadTimer = null;

// ════ CSV 載入與排序 ════
window.onload = () => {
  Papa.parse("data.csv", {
    download: true, header: true, skipEmptyLines: true,
    complete: (results) => {
      let data = results.data;
      if (data[0]?.hasOwnProperty('order')) data.sort((a,b) => (parseInt(a.order)||0) - (parseInt(b.order)||0));
      artworks = data.map(r => ({ nm: r.title, img: `image/${r.image}.jpg`, audio: `audio/${r.audio}.mp3`, desc: r.description||"", dynamicQs: null }));
      if (artworks.length) { initSphere(); changeAW(0); }
    }
  });
};

// ════ 播放器修正 ════
document.getElementById('p-track').addEventListener('click', (e) => {
  const rect = e.currentTarget.getBoundingClientRect();
  const pos = (e.clientX - rect.left) / rect.width;
  if (currentAudio.duration) currentAudio.currentTime = pos * currentAudio.duration;
});
currentAudio.addEventListener('timeupdate', () => {
  const p = (currentAudio.currentTime / currentAudio.duration) * 100 || 0;
  document.getElementById('pf').style.width = p + '%';
  document.getElementById('t-now').textContent = formatTime(currentAudio.currentTime);
});
currentAudio.ontimeupdate = () => { document.getElementById('t-tot').textContent = formatTime(currentAudio.duration); };

function formatTime(s) { return Math.floor(s/60) + ":" + String(Math.floor(s%60)).padStart(2,'0'); }
function togglePlay(){
  if(isPlaying){ currentAudio.pause(); document.getElementById('pl-btn').textContent='▶'; }
  else { currentAudio.play(); document.getElementById('pl-btn').textContent='II'; }
  isPlaying = !isPlaying;
}

function changeAW(d){
  curAW = (curAW + d + artworks.length) % artworks.length;
  const a = artworks[curAW];
  document.getElementById('aw-img').src = a.img;
  document.getElementById('aw-nm').textContent = a.nm;
  document.getElementById('aw-ct').textContent = (curAW+1) + " / " + artworks.length;
  document.getElementById('g-text-container').innerHTML = a.desc;
  currentAudio.src = a.audio; isPlaying = false; document.getElementById('pl-btn').textContent='▶';
  
  // 🏆 修正：預載邏輯調優
  qLabelEls.forEach(el => el.querySelector('.ql-text').textContent = "點擊解析...");
  clearTimeout(preloadTimer);
  preloadTimer = setTimeout(() => preloadLimited(curAW), 3000); // 3秒後只載入3題
}

// ════ API 降載預載：只產3題 ════
async function preloadLimited(idx) {
  const art = artworks[idx];
  if (art.dynamicQs) return updateLabelsText(art.dynamicQs);
  
  const prompt = `展品《${art.nm}》背景：${art.desc}。請生成 3 個簡短提問，每行一個，不要編號。`;
  try {
    const res = await fetch(WORKER_URL, { method:'POST', body: JSON.stringify({ contents:[{parts:[{text:prompt}]}] }) });
    const data = await res.json();
    let qs = data.candidates[0].content.parts[0].text.split('\n').filter(t=>t.trim()).slice(0,3);
    art.dynamicQs = [...qs, ...Array(7).fill("點擊繼續解析...")];
    if (curAW === idx) updateLabelsText(art.dynamicQs);
  } catch(e) { console.error("API 429 或網路問題"); }
}

function updateLabelsText(qs) {
  qs.forEach((q, i) => { if(qLabelEls[i]) qLabelEls[i].querySelector('.ql-text').textContent = q; });
}

// ════ 3D 與 標籤 ════
let renderer, scene, camera, wire, qLabelEls=[];
function initSphere(){
  const canvas = document.getElementById('orb-canvas');
  renderer = new THREE.WebGLRenderer({canvas, alpha:true, antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
  camera.position.z = 4;
  
  // 🏆 修正：球體大小回縮
  wire = new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.IcosahedronGeometry(1.25, 2)), new THREE.LineBasicMaterial({color:0x4fc3f7, opacity:0.3, transparent:true}));
  wire.position.y = 0.3;
  scene.add(wire);

  const layer = document.getElementById('qlayer');
  for(let i=0; i<NUM_Q; i++){
    const el = document.createElement('div'); el.className='q-label';
    el.innerHTML=`<div class="ql-box"><span class="ql-num">Q.${i+1}</span><span class="ql-text">解析中...</span></div>`;
    el.onclick = () => {
      const txt = el.querySelector('.ql-text').textContent;
      if(txt.includes('點擊')) fetchSingle(el);
      else renderAnswer(txt);
    };
    layer.appendChild(el); qLabelEls.push(el);
  }
  
  // 拖拽旋轉
  let isDown = false, lastX;
  canvas.onpointerdown = e => { isDown = true; lastX = e.clientX; };
  window.onpointermove = e => { if(isDown) { wire.rotation.y += (e.clientX - lastX) * 0.01; lastX = e.clientX; } };
  window.onpointerup = () => isDown = false;

  const animate = () => { requestAnimationFrame(animate); if(!isDown) wire.rotation.y += 0.002; renderer.render(scene, camera); updateTagPos(); };
  animate();
}

function updateTagPos() {
  const phiArr = [0.7, 1.2, 1.7, 2.2, 2.7, 0.9, 1.4, 1.9, 2.4, 1.5]; // 預設 10 個位置
  qLabelEls.forEach((el, i) => {
    const phi = phiArr[i], theta = i * 1.3 + wire.rotation.y;
    const pos = new THREE.Vector3().setFromSphericalCoords(1.25, phi, theta).add(wire.position);
    pos.project(camera);
    el.style.left = (pos.x+1)/2*window.innerWidth + 'px';
    el.style.top = -(pos.y-1)/2*window.innerHeight + 'px';
    el.style.opacity = pos.z < 1 ? 1 : 0;
  });
}

async function renderAnswer(q) {
  document.getElementById('ans-sheet').classList.add('open');
  document.getElementById('sheetq').textContent = q;
  document.getElementById('sheeta').textContent = "AI 正在思考中...";
  const res = await fetch(WORKER_URL, { method:'POST', body: JSON.stringify({ contents:[{parts:[{text:`展品《${artworks[curAW].nm}》提問：${q}，請簡短回答。`}]}] }) });
  const data = await res.json();
  document.getElementById('sheeta').textContent = data.candidates[0].content.parts[0].text;
}

function showAI(){ document.getElementById('sa').classList.add('show'); currentAudio.pause(); }
function hideAI(){ document.getElementById('sa').classList.remove('show'); }
function closeSheet(){ document.getElementById('ans-sheet').classList.remove('open'); }
</script>
</body>
</html>
